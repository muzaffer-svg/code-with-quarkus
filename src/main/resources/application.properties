quarkus.rest-client.agify-api.url=https://api.agify.io
quarkus.rest-client.binance-api.url=https://api.binance.com


# JWT'yi kimin ürettiği (Mührün sahibi)
mp.jwt.verify.issuer=kampus-sistemi


# CORS izni (Farklı portlardan gelen HTML isteklerine izin ver)
quarkus.http.cors=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/campusdb
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}

# Geliştirme aşamasında olduğumuz için tabloları otomatik yenileme açık kalsın
quarkus.hibernate-orm.database.generation=drop-and-create
