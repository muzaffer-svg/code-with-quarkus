<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Kayıt - AYBÜ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .register-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-top: 10px; font-weight: 700; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 13px; color: #34495e; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .msg { font-size: 14px; margin-top: 15px; display: none; font-weight: 600; }
        .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #5a6a85; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="#3498db"><path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3Z"/></svg>
        <h2>Öğrenci Kayıt</h2>
        <p>Lütfen sisteme kaydolmak için bilgilerinizi eksiksiz girin.</p>
        
        <form id="registerForm">
            <div class="form-group"><label>Adınız</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Soyadınız</label><input type="text" id="lastname" required></div>
            <div class="form-group"><label>E-posta Adresiniz</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Telefon Numaranız</label><input type="text" id="phoneNumber" required></div>
            <div class="form-group"><label>Öğrenci Numaranız</label><input type="text" id="studentNumber" required></div>
            
            <button type="submit">Sisteme Kaydol</button>
            <div id="statusMsg" class="msg"></div>
        </form>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('statusMsg');
            
            const studentData = {
                name: document.getElementById('name').value,
                lastname: document.getElementById('lastname').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                studentNumber: document.getElementById('studentNumber').value
            };

            fetch('http://localhost:8080/api/studentss', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            })
            .then(response => {
                if(response.status === 201) {
                    msg.style.display = 'block'; msg.style.color = 'green';
                    msg.innerText = 'Kayıt Başarılı! Giriş sayfasına yönlendiriliyorsunuz...';
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    throw new Error("Kayıt yapılamadı, bilgiler hatalı veya e-posta/numara zaten kullanımda.");
                }
            })
            .catch(err => {
                msg.style.display = 'block'; msg.style.color = 'red';
                msg.innerText = err.message;
            });
        });
    </script>
</body>
</html>
