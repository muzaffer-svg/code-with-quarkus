
            <!DOCTYPE html>
            <html lang="tr">
            <head>
                <meta charset="UTF-8">
                <title>Öğrenci Kayıt Portalı</title>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
                <style>
                    /* Sayfayı tam ekran yapıp içeriği tam ortaya alıyoruz */
                    body { 
                        font-family: 'Inter', sans-serif; 
                        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                        display: flex; 
                        justify-content: center; 
                        align-items: center; 
                        min-height: 100vh; 
                        margin: 0; 
                    }
                    /* Beyaz kutuyu (kartı) şekillendiriyoruz */
                    .register-card { 
                        background: white; 
                        padding: 40px; 
                        border-radius: 16px; 
                        box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
                        width: 100%; 
                        max-width: 380px; 
                        text-align: center; 
                    }
                    /* Logo Ayarları */
                    .logo-container { margin-bottom: 20px; }
                    .logo-svg { width: 70px; height: 70px; fill: #3498db; }
                    
                    /* Başlıklar ve Metinler */
                    h2 { color: #2c3e50; margin: 0 0 8px 0; font-size: 24px; font-weight: 700; }
                    .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
                    
                    /* Form Elemanları */
                    .form-group { margin-bottom: 16px; text-align: left; }
                    .form-group label { display: block; font-size: 13px; color: #34495e; margin-bottom: 6px; font-weight: 600; }
                    input { 
                        width: 100%; 
                        padding: 12px; 
                        border: 1px solid #dfe6e9; 
                        border-radius: 8px; 
                        box-sizing: border-box; 
                        font-size: 14px; 
                        transition: all 0.3s ease; 
                        background-color: #fcfcfc;
                    }
                    input:focus { 
                        outline: none; 
                        border-color: #3498db; 
                        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15); 
                        background-color: #ffffff;
                    }
                    button { 
                        width: 100%; 
                        padding: 14px; 
                        background: #3498db; 
                        color: white; 
                        border: none; 
                        border-radius: 8px; 
                        font-size: 16px; 
                        font-weight: 600; 
                        cursor: pointer; 
                        transition: background 0.3s, transform 0.1s; 
                        margin-top: 10px; 
                    }
                    button:hover { background: #2980b9; }
                    button:active { transform: translateY(2px); }
                </style>
            </head>
            <body>
                
                <div class="register-card">
                    <div class="logo-container">
                        <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9ZM17 15.99L12 18.72L7 15.99V12.27L12 15L17 12.27V15.99Z"/>
                        </svg>
                    </div>
                    
                    <h2>Öğrenci Kayıt</h2>
                    <p class="subtitle">Lütfen sisteme kaydolmak için bilgilerinizi girin.</p>
                    
                    <form id="ogrenciFormu">
                        <div class="form-group">
                            <label for="name">Ad Soyad</label>
                            <input type="text" id="name" placeholder="Örn: Ahmet Yılmaz" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Yaş</label>
                            <input type="number" id="age" placeholder="Örn: 21" required>
                        </div>
                        <div class="form-group">
                            <label for="grade">Sınıf</label>
                            <input type="number" id="grade" placeholder="Örn: 3" required>
                        </div>
                        <div class="form-group">
                            <label for="studentId">Öğrenci Numarası</label>
                            <input type="number" id="studentId" placeholder="Örn: 2024001" required>
                        </div>
                        <button type="submit">Sisteme Kaydol</button>
                    </form>
                </div>

                <script>
                    document.getElementById('ogrenciFormu').addEventListener('submit', function(e) {
                        e.preventDefault(); 
                        
                        const button = e.target.querySelector('button');
                        const originalText = button.innerText;
                        button.innerText = 'Kaydediliyor...';
                        button.disabled = true;
                        
                        const studentData = {
                            name: document.getElementById('name').value,
                            age: parseInt(document.getElementById('age').value),
                            grade: parseInt(document.getElementById('grade').value),
                            studentId: parseInt(document.getElementById('studentId').value)
                        };

                        fetch('/api/studentss', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(studentData)
                        })
                        .then(response => {
                            if(response.ok) {
                                alert("Kayıt Başarılı! Hoş geldin " + studentData.name);
                                e.target.reset(); // Başarılıysa formu temizle
                            } else {
                                alert("Kayıt sırasında bir hata oluştu.");
                            }
                        })
                        .catch(error => {
                            console.error('Hata:', error);
                            alert("Sunucuya bağlanılamadı.");
                        })
                        .finally(() => {
                            button.innerText = originalText;
                            button.disabled = false;
                        });
                    });
                </script>
            </body>
            </html>
