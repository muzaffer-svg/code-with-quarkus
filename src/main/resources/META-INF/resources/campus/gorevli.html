<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Görevli Kayıt - AYBÜ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #e8f8f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .register-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-top: 10px; font-weight: 700; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .form-row { display: flex; gap: 10px; }
        .form-group { margin-bottom: 16px; text-align: left; flex: 1; }
        label { display: block; font-size: 13px; color: #34495e; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .msg { font-size: 14px; margin-top: 15px; display: none; font-weight: 600; }
        .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #5a6a85; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="#2ecc71"><path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM11 7V9H17V7H11ZM11 11V13H17V11H11ZM11 15V17H17V15H11ZM7 7H9V9H7V7ZM7 11H9V13H7V11ZM7 15H9V17H7V15Z"/></svg>
        <h2>Görevli Kayıt</h2>
        <p>Lütfen üniversite personeli kaydınızı tamamlayın.</p>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group"><label>Ad</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Soyad</label><input type="text" id="lastname" required></div>
            </div>
            <div class="form-group"><label>E-posta Adresi</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Telefon Numarası</label><input type="text" id="phoneNumber" required></div>
            <div class="form-group"><label>Görevli Numarası / Sicil No</label><input type="text" id="officialId" required></div>
            
            <button type="submit">Görevli Olarak Kaydol</button>
            <div id="statusMsg" class="msg"></div>
        </form>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('statusMsg');
            
            const officialData = {
                name: document.getElementById('name').value,
                lastname: document.getElementById('lastname').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                officialId: document.getElementById('officialId').value
            };

            fetch('http://localhost:8080/api/officials', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(officialData)
            })
            .then(response => {
                if(response.status === 201) {
                    msg.style.display = 'block'; msg.style.color = 'green';
                    msg.innerText = 'Kayıt Başarılı! Ana sayfaya yönlendiriliyorsunuz...';
                    setTimeout(() => window.location.href = "index.html", 2000);
                } else {
                    throw new Error("Kayıt yapılamadı, bilgiler hatalı.");
                }
            })
            .catch(err => {
                msg.style.display = 'block'; msg.style.color = 'red';
                msg.innerText = err.message;
            });
        });
    </script>
</body>
</html>
