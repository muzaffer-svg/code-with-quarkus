<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Görevli Kayıt Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #bbf7d0 100%); /* Yeşil tonlu arkaplan */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .register-card { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        .logo-container { margin-bottom: 20px; }
        .logo-svg { width: 70px; height: 70px; fill: #2ecc71; } /* Yeşil İkon */
        
        h2 { color: #2c3e50; margin: 0 0 8px 0; font-size: 24px; font-weight: 700; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #34495e; margin-bottom: 6px; font-weight: 600; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dfe6e9; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            transition: all 0.3s ease; 
            background-color: #fcfcfc;
        }
        input:focus { 
            outline: none; 
            border-color: #2ecc71; 
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15); 
            background-color: #ffffff;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #2ecc71; /* Yeşil Buton */
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.3s, transform 0.1s; 
            margin-top: 10px; 
        }
        button:hover { background: #27ae60; }
        button:active { transform: translateY(2px); }
    </style>
</head>
<body>
    
    <div class="register-card">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM11 7V9H17V7H11ZM11 11V13H17V11H11ZM11 15V17H17V15H11ZM7 7H9V9H7V7ZM7 11H9V13H7V11ZM7 15H9V17H7V15Z"/>
            </svg>
        </div>
        
        <h2>Görevli Kayıt</h2>
        <p class="subtitle">Lütfen üniversite personeli kaydınızı tamamlayın.</p>
        
        <form id="gorevliFormu">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Ad</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Soyad</label>
                    <input type="text" id="lastname" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">E-posta Adresi</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label for="phoneNumber">Telefon Numarası</label>
                <input type="tel" id="phoneNumber" required>
            </div>
            
            <div class="form-group">
                <label for="officialId">Görevli Numarası / Sicil No</label>
                <input type="text" id="officialId" required>
            </div>
            
            <button type="submit">Görevli Olarak Kaydol</button>
        </form>
    </div>

    <script>
        document.getElementById('gorevliFormu').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const button = e.target.querySelector('button');
            const originalText = button.innerText;
            button.innerText = 'Kaydediliyor...';
            button.disabled = true;
            
            // Veritabanı sınıfındaki isimlerle birebir aynı nesneyi oluşturuyoruz
            const officialData = {
                name: document.getElementById('name').value,
                lastname: document.getElementById('lastname').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                officialId: document.getElementById('officialId').value
            };

            // İleride yazacağımız backend adresi: /api/officials
            fetch('/api/officials', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(officialData)
            })
            .then(response => {
                if(response.ok) {
                    alert("Kayıt Başarılı! Hoş geldiniz " + officialData.name);
                    e.target.reset();
                } else {
                    alert("Kayıt sırasında bir hata oluştu.");
                }
            })
            .catch(error => {
                console.error('Hata:', error);
                alert("Sunucuya bağlanılamadı.");
            })
            .finally(() => {
                button.innerText = originalText;
                button.disabled = false;
            });
        });
    </script>
</body>
</html>
