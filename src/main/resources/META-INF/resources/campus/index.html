<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AYBÜ Kampüs Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Derin ve modern bir mavi arkaplan */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* Modern Kart Tasarımı ve Cam Efekti */
        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        /* Ana Üniversite İkonu */
        .university-icon {
            width: 75px;
            height: 75px;
            fill: #1e3c72;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #1e3c72;
            margin: 0 0 12px 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        p {
            color: #5a6a85;
            margin-bottom: 35px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Buton Genel Stilleri */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        /* Buton İçi İkonlar */
        .btn-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        /* Öğrenci Butonu Mavi Tonu */
        .btn-student {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3);
        }
        
        /* Görevli Butonu Yeşil Tonu */
        .btn-staff {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3);
        }
        
        /* Buton Vurgu (Hover) Efektleri */
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.25);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <svg class="university-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L1 8V10H3V20H1V22H23V20H21V10H23V8L12 3ZM5 10H7V20H5V10ZM9 10H11V20H9V10ZM13 10H15V20H13V10ZM17 10H19V20H17V10ZM12 5.38L18.81 8H5.19L12 5.38Z"/>
        </svg>
        
        <h1>AYBÜ Kampüs Portalı</h1>
        <p>Sisteme giriş yapmak veya yeni kayıt oluşturmak için lütfen rolünüzü seçin.</p>
        
        <div class="btn-container">
            <a href="/campus/ogrenci.html" class="btn btn-student">
                <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9Z"/>
                </svg>
                Öğrenci Girişi
            </a>
            
            <a href="/campus/gorevli.html" class="btn btn-staff">
                <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM11 7V9H17V7H11ZM11 11V13H17V11H11ZM11 15V17H17V15H11ZM7 7H9V9H7V7ZM7 11H9V13H7V11ZM7 15H9V17H7V15Z"/>
                </svg>
                Üniversite Görevlisi Girişi
            </a>
        </div>
    </div>
</body>
</html>
